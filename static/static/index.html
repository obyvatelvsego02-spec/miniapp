<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Дашборд группы</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <main class="app-shell">
    <section class="hero glass">
      <div class="hero__text">
        <div class="hero__eyebrow">MINI APP</div>
        <h1>Финансовый дашборд группы</h1>
        <p id="chatTitle" class="hero__subtitle">Загрузка данных…</p>
      </div>
      <div class="hero__actions">
        <button id="refreshBtn" class="btn btn--ghost" type="button">Обновить</button>
      </div>
    </section>

    <section class="cards-grid">
      <button class="metric-card metric-card--balance" data-open="balance" type="button">
        <span class="metric-card__label">Баланс</span>
        <span class="metric-card__value" id="balanceValue">—</span>
        <span class="metric-card__hint">Текущий остаток</span>
      </button>

      <button class="metric-card" data-open="spread" type="button">
        <span class="metric-card__label">Спред</span>
        <span class="metric-card__value" id="spreadValue">—</span>
        <span class="metric-card__hint">Приход − фикс</span>
      </button>

      <button class="metric-card" data-open="payouts" type="button">
        <span class="metric-card__label">Выдачи</span>
        <span class="metric-card__value" id="payoutsValue">—</span>
        <span class="metric-card__hint">Всего за день</span>
      </button>

      <button class="metric-card" data-open="income" type="button">
        <span class="metric-card__label">Приход за день</span>
        <span class="metric-card__value" id="incomeValue">—</span>
        <span class="metric-card__hint">Все поступления</span>
      </button>

      <button class="metric-card" data-open="fixed" type="button">
        <span class="metric-card__label">Фикс за день</span>
        <span class="metric-card__value" id="fixedValue">—</span>
        <span class="metric-card__hint">Все фиксы</span>
      </button>
    </section>

    <section class="panel glass">
      <div class="panel__header">
        <div>
          <div class="panel__eyebrow">Детализация</div>
          <h2 id="historyTitle">Последние выдачи</h2>
        </div>
        <div class="panel__badge" id="historyBadge">Сегодня</div>
      </div>

      <div class="tabs">
        <button class="tab is-active" data-open="payouts" type="button">Выдачи</button>
        <button class="tab" data-open="income" type="button">Приходы</button>
        <button class="tab" data-open="fixed" type="button">Фиксы</button>
        <button class="tab" data-open="balance" type="button">Баланс</button>
        <button class="tab" data-open="spread" type="button">Спред</button>
      </div>

      <div id="historyBody" class="history-list">
        <div class="empty-state">
          <div class="empty-state__icon">∿</div>
          <div class="empty-state__title">Нет данных</div>
          <div class="empty-state__text">Как только в чате появятся операции, они будут видны здесь.</div>
        </div>
      </div>
    </section>
  </main>

  <script src="/static/script.js"></script>
</body>
</html>
